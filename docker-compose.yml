services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./dataset:/app/dataset
      - ./output:/app/output
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - SCHEDULER_URL=http://scheduler:8000
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./dataset:/app/dataset
      - ./output:/app/output
    depends_on:
      scheduler:
        condition: service_healthy
